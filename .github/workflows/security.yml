name: Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run security checks weekly on Sundays
    - cron: '0 0 * * 0'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2

    - name: Set up Go
      uses: actions/setup-go@v6.3.0
      with:
        go-version: '1.26'

    - name: Install system dependencies
      run: make install-deps-linux

    - name: Set up virtual display
      run: make setup-display-linux

    - name: Cache Go modules
      uses: actions/cache@v5.0.4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ubuntu-latest-go-1.26-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ubuntu-latest-go-1.26-

    - name: Run security checks
      run: make security

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6.0.2

    - name: Dependency Review
      uses: actions/dependency-review-action@v4.9.0
